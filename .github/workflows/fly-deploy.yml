name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Which app to deploy"
        required: true
        default: "both"
        type: choice
        options: [both, web, room]

jobs:
  deploy-room:
    name: Deploy room (realtime)
    if: github.event_name == 'push' || github.event.inputs.target == 'both' || github.event.inputs.target == 'room'
    runs-on: ubuntu-latest
    concurrency:
      group: fly-room
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy room
        run: flyctl deploy --remote-only
        working-directory: apps/room
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy web (frontend)
    needs: deploy-room
    if: always() && (github.event_name == 'push' || github.event.inputs.target == 'both' || github.event.inputs.target == 'web')
    runs-on: ubuntu-latest
    concurrency:
      group: fly-web
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy web
        run: flyctl deploy --remote-only --build-arg VITE_ROOM_SERVER="${VITE_ROOM_SERVER}"
        working-directory: apps/web
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VITE_ROOM_SERVER: ${{ vars.VITE_ROOM_SERVER || 'https://edraw-room.fly.dev' }}
