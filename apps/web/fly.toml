# Fly config for the web frontend.
# Rename `app` to whatever name you used with `flyctl launch`.
app = "edraw-web"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"
  # The room URL is baked at build time. Set it in GitHub Actions or via:
  #   flyctl deploy --build-arg VITE_ROOM_SERVER=https://edraw-room.fly.dev
  [build.args]
    VITE_ROOM_SERVER = "https://edraw-room.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
